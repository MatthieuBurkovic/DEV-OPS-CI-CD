name: CI/CD Pipeline

on:
  pull_request:
    branches: [dev]
  push:
    branches: [main]

jobs:
  ci:
    name: CI - Tests & Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Audit backend
        run: cd backend && npm audit --audit-level=high

      - name: Run backend tests
        run: cd backend && npm test

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Run frontend tests
        run: cd frontend && npm test -- --watchAll=false

      - name: Build Docker images
        run: docker compose build

  cd:
    name: CD - Push to Docker Hub
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create backend .env from secrets
        run: echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" > backend/.env

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: burkovicmatthieu/ci-cd-backend:latest

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: burkovicmatthieu/ci-cd-frontend:latest